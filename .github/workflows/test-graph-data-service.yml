name: Test Graph Data Service

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'graph-data-service/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'graph-data-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('graph-data-service/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      working-directory: ./graph-data-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run tests
      working-directory: ./graph-data-service
      run: |
        pytest tests/ -v --tb=short
    
    - name: Generate coverage report
      working-directory: ./graph-data-service
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./graph-data-service/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Check coverage threshold
      working-directory: ./graph-data-service
      run: |
        pytest tests/ --cov=src --cov-fail-under=80

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./graph-data-service
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Lint with flake8
      working-directory: ./graph-data-service
      run: |
        flake8 src tests --max-line-length=100 --exclude=__pycache__,venv
      continue-on-error: true
    
    - name: Check formatting with black
      working-directory: ./graph-data-service
      run: |
        black --check src tests
      continue-on-error: true
