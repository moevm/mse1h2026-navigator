services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: mongosh --eval "rs.status()" --quiet
      interval: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    command: mongosh --host mongo --eval "rs.initiate()"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=mongodb://mongo:27017/navigator?replicaSet=rs0
    depends_on:
      mongo-init:
        condition: service_completed_successfully

volumes:
  mongo-data:
